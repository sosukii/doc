name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Устанавливаем Node.js 22 (или 24) и включаем кеш npm
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Ставим зависимости детерминированно
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      # Запускаем Nuxt-сервер и e2e тесты: когда сервер доступен, Cypress стартует
      - name: E2E Tests
        run: npx start-server-and-test "npm run preview -- -p 3000" http://localhost:3000 "npm run test:e2e"